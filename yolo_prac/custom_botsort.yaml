tracker_type: botsort

track_high_thresh: 0.25
track_low_thresh: 0.10
new_track_thresh: 0.35

track_buffer: 60
match_thresh: 0.85
fuse_score: True

gmc_method: none

proximity_thresh: 0.40
appearance_thresh: 0.80
with_reid: True
model: auto

# botsort는 DeepSORT와 동일한 하이퍼파라미터를 사용하지만, 추가적으로 proximity_thresh와 appearance_thresh가 있습니다.

# track_high_thresh는 객체의 위치 정보와 외형 정보를 모두 고려하여 추적을 수행할 때, 객체 간의 유사도를 측정하는 임계값입니다. 이 값이 높을수록 객체 간의 유사도가 높아야 추적이 유지됩니다.
# track_low_thresh는 객체의 위치 정보와 외형 정보를 모두 고려하여 추적을 수행할 때, 객체 간의 유사도를 측정하는 임계값입니다. 이 값이 낮을수록 객체 간의 유사도가 낮아도 추적이 유지됩니다.
# new_track_thresh는 새로운 객체가 등장했을 때, 해당 객체를 추적 대상으로 등록하는 임계값입니다. 이 값이 높을수록 새로운 객체가 등장했을 때, 해당 객체를 추적 대상으로 등록하기 어렵습니다. 

# track_buffer는 객체가 추적에서 사라진 후, 해당 객체를 추적 대상으로 유지하는 최대 프레임 수입니다. 이 값이 높을수록 객체가 추적에서 사라진 후에도 해당 객체를 추적 대상으로 유지할 수 있습니다.
# match_thresh는 객체 간의 유사도를 측정하는 임계값입니다. 이 값이 높을수록 객체 간의 유사도가 높아야 추적이 유지됩니다.
# fuse_score는 객체의 위치 정보와 외형 정보를 모두 고려하여 추적을 수행할 때, 객체 간의 유사도를 측정하는 방법입니다. True로 설정하면, 객체의 위치 정보와 외형 정보를 모두 고려하여 추적을 수행합니다. False로 설정하면, 객체의 위치 정보만 고려하여 추적을 수행합니다.

# gmc_method는 객체의 위치 정보와 외형 정보를 모두 고려하여 추적을 수행할 때, 객체 간의 유사도를 측정하는 방법입니다. none으로 설정하면, 객체의 위치 정보와 외형 정보를 모두 고려하여 추적을 수행합니다. motion으로 설정하면, 객체의 위치 정보만 고려하여 추적을 수행합니다. appearance로 설정하면, 객체의 외형 정보만 고려하여 추적을 수행합니다.

# proximity_thresh는 객체의 위치 정보를 기반으로 추적을 수행할 때, 객체 간의 거리를 측정하는 임계값입니다. 이 값이 낮을수록 객체 간의 거리가 가까워야 추적이 유지됩니다.
# appearance_thresh는 객체의 외형 정보를 기반으로 추적을 수행할 때, 객체 간의 유사도를 측정하는 임계값입니다. 이 값이 높을수록 객체 간의 외형이 유사해야 추적이 유지됩니다.
# with_reid는 객체의 외형 정보를 기반으로 추적을 수행할 때, 객체 간의 유사도를 측정하는 방법입니다. True로 설정하면, 객체의 외형 정보를 기반으로 추적을 수행합니다. False로 설정하면, 객체의 위치 정보만 고려하여 추적을 수행합니다.
# model은 객체의 외형 정보를 기반으로 추적을 수행할 때, 객체 간의 유사도를 측정하는 방법입니다. auto로 설정하면, 객체의 외형 정보를 기반으로 추적을 수행할 때, 객체 간의 유사도를 측정하는 방법을 자동으로 선택합니다. reid로 설정하면, 객체의 외형 정보를 기반으로 추적을 수행할 때, 객체 간의 유사도를 측정하는 방법으로 reid 모델을 사용합니다. feature로 설정하면, 객체의 외형 정보를 기반으로 추적을 수행할 때, 객체 간의 유사도를 측정하는 방법으로 feature를 사용합니다.