      <text x="26" y="28" class="tiny" fill="#e2e8f0">Risk Event</text>
      <text x="26" y="50" class="tiny" fill="#e2e8f0">DB log · Snapshot · Alert</text>
    </g>
  </g>

  <g transform="translate(1526 178)">
    <rect class="card" width="202" height="790"/>
    <text x="32" y="52" class="section-title">05 Client</text>
    <text x="32" y="80" class="section-sub">Dashboard / Report</text>

    <g transform="translate(28 146)">
      <rect class="inner" width="146" height="92" fill="#ecfeff" stroke="#a5f3fc"/>
      <circle cx="36" cy="46" r="27" fill="#0891b2"/>
      <text x="21" y="52" class="badge-text">RE</text>
      <text x="78" y="39" class="label">React</text>
      <text x="78" y="64" class="small">dashboard</text>
