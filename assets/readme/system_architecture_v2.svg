    <text x="32" y="80" class="section-sub">Storage / Async / Alert</text>

    <g transform="translate(30 126)">
      <rect class="inner" width="196" height="92" fill="#eff6ff" stroke="#bfdbfe"/>
      <circle cx="44" cy="46" r="27" fill="#2563eb"/>
      <text x="30" y="52" class="badge-text">PG</text>
      <text x="82" y="38" class="label">PostgreSQL</text>
      <text x="82" y="64" class="small">incident index</text>
    </g>

    <g transform="translate(30 250)">
      <rect class="inner" width="196" height="92" fill="#fef2f2" stroke="#fecaca"/>
      <circle cx="44" cy="46" r="27" fill="#dc2626"/>
      <text x="30" y="52" class="badge-text">RD</text>
      <text x="82" y="38" class="label">Redis</text>
      <text x="82" y="64" class="small">async report job</text>
    </g>

    <g transform="translate(30 374)">
      <rect class="inner" width="196" height="92" fill="#f0fdf4" stroke="#bbf7d0"/>
      <circle cx="44" cy="46" r="27" fill="#16a34a"/>
      <text x="29" y="52" class="badge-text">MQ</text>
      <text x="82" y="38" class="label">MQTT</text>
      <text x="82" y="64" class="small">warning / danger</text>
