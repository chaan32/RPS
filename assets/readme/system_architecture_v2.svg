      <rect class="inner" width="394" height="88" fill="#eff6ff" stroke="#bfdbfe"/>
      <circle cx="48" cy="44" r="27" fill="url(#blue)"/>
      <text x="34" y="50" class="badge-text">FA</text>
      <text x="88" y="36" class="label">FastAPI / Python</text>
      <text x="88" y="62" class="small">realtime camera runtime · metrics · API</text>
    </g>

    <g transform="translate(30 236)">
      <rect class="inner" width="180" height="132" fill="#fff1f2" stroke="#fecdd3"/>
      <circle cx="46" cy="48" r="27" fill="#e11d48"/>
      <text x="32" y="54" class="badge-text">YP</text>
      <text x="86" y="42" class="label">YOLO11s</text>
      <text x="86" y="66" class="small">Pose</text>
      <text x="26" y="106" class="small">worker keypoints</text>
