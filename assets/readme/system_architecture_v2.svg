    <g transform="translate(244 578)">
      <rect class="inner" width="180" height="112" fill="#ecfdf5" stroke="#bbf7d0"/>
      <circle cx="46" cy="50" r="27" fill="#059669"/>
      <text x="33" y="56" class="badge-text">V2</text>
      <text x="86" y="42" class="label">Fusion V2</text>
      <text x="26" y="82" class="small">GRU · 24-frame</text>
    </g>
