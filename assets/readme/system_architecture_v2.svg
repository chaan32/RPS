      <circle cx="44" cy="46" r="27" fill="#ea580c"/>
      <text x="32" y="52" class="badge-text">LL</text>
      <text x="82" y="38" class="label">Ollama</text>
      <text x="82" y="64" class="small">daily report</text>
    </g>

    <g transform="translate(30 646)">
