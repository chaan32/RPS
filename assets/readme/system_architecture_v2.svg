<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="52%" stop-color="#f2f7fb"/>
      <stop offset="100%" stop-color="#eef5f1"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#84cc16"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" x2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:48px;font-weight:900;fill:#0f172a;letter-spacing:-0.5px}
      .subtitle{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:21px;font-weight:500;fill:#475569}
      .section-title{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:24px;font-weight:850;fill:#111827}
      .section-sub{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:15px;font-weight:600;fill:#64748b}
      .label{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:17px;font-weight:800;fill:#111827}
      .small{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:13px;font-weight:600;fill:#64748b}
      .tiny{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:12px;font-weight:700;fill:#64748b}
      .badge-text{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:14px;font-weight:850;fill:#f8fafc}
      .chip-text{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:13px;font-weight:800;fill:#334155}
      .card{fill:#ffffff;stroke:#dbe5ef;stroke-width:2;rx:28;filter:url(#shadow)}
      .inner{fill:#f8fafc;stroke:#d8e2ed;stroke-width:1.6;rx:18}
      .arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round}
      .dash{stroke:#94a3b8;stroke-width:3;fill:none;stroke-dasharray:8 10;marker-end:url(#arrow);stroke-linecap:round}
      .thin{stroke:#cbd5e1;stroke-width:2;fill:none}
    </style>
  </defs>

  <rect width="1800" height="1120" rx="44" fill="url(#bg)"/>
  <circle cx="1610" cy="60" r="220" fill="#dbeafe" opacity="0.42"/>
  <circle cx="130" cy="980" r="260" fill="#dcfce7" opacity="0.35"/>

  <text x="80" y="88" class="title">Multi-View AI Backend System Architecture</text>
  <text x="82" y="125" class="subtitle">Unity 시뮬레이션 영상 입력부터 RTSP 스트리밍, 비전 추론, BEV Fusion, DB/알림/리포트, React 대시보드까지 연결한 구조</text>

  <g transform="translate(72 178)">
    <rect class="card" width="256" height="790"/>
    <text x="32" y="52" class="section-title">01 Source</text>
    <text x="32" y="80" class="section-sub">Digital Twin / Camera</text>

    <g transform="translate(30 126)">
      <rect class="inner" width="196" height="104" fill="#eef2ff" stroke="#bfdbfe"/>
      <circle cx="44" cy="52" r="27" fill="url(#blue)"/>
      <text x="31" y="58" class="badge-text">U</text>
      <text x="82" y="44" class="label">Unity</text>
      <text x="82" y="68" class="small">공장 사각지대</text>
      <text x="82" y="88" class="small">시나리오 생성</text>
    </g>

    <g transform="translate(30 258)">
      <rect class="inner" width="196" height="104" fill="#f8fafc"/>
      <circle cx="44" cy="52" r="27" fill="#334155"/>
      <text x="29" y="58" class="badge-text">C#</text>
      <text x="82" y="44" class="label">C# Tools</text>
      <text x="82" y="68" class="small">배치 / 녹화</text>
      <text x="82" y="88" class="small">waypoint 자동화</text>
    </g>

    <g transform="translate(30 390)">
      <rect class="inner" width="196" height="138" fill="#ecfeff" stroke="#a5f3fc"/>
      <circle cx="44" cy="48" r="27" fill="#0891b2"/>
      <text x="30" y="54" class="badge-text">C1</text>
      <circle cx="44" cy="92" r="27" fill="#0e7490"/>
      <text x="30" y="98" class="badge-text">C2</text>
      <text x="82" y="42" class="label">cam1 / cam2</text>
      <text x="82" y="68" class="small">멀티뷰 영상</text>
      <text x="82" y="92" class="small">120 frame clips</text>
      <text x="82" y="116" class="small">blind-spot view</text>
    </g>

    <g transform="translate(30 594)">
      <rect width="196" height="118" rx="20" fill="#0f172a"/>
      <text x="26" y="38" font-family="Inter,Apple SD Gothic Neo,Pretendard,Arial" font-size="16" font-weight="850" fill="#f8fafc">Output Contract</text>
      <text x="26" y="68" class="tiny" fill="#cbd5e1">cam1_frames/*.jpg</text>
      <text x="26" y="92" class="tiny" fill="#cbd5e1">cam2_frames/*.jpg</text>
    </g>
  </g>

  <g transform="translate(386 178)">
    <rect class="card" width="256" height="790"/>
    <text x="32" y="52" class="section-title">02 Streaming</text>
    <text x="32" y="80" class="section-sub">Publisher / RTSP Server</text>

    <g transform="translate(30 146)">
      <rect class="inner" width="196" height="104" fill="#fff7ed" stroke="#fed7aa"/>
      <circle cx="44" cy="52" r="27" fill="#ea580c"/>
      <text x="30" y="58" class="badge-text">FF</text>
      <text x="82" y="44" class="label">FFmpeg</text>
      <text x="82" y="70" class="small">frame sequence</text>
      <text x="82" y="91" class="small">publish</text>
    </g>

    <path d="M128 270 L128 318" class="thin"/>

    <g transform="translate(30 318)">
      <rect class="inner" width="196" height="104" fill="#ecfdf5" stroke="#bbf7d0"/>
      <circle cx="44" cy="52" r="27" fill="#16a34a"/>
      <text x="27" y="58" class="badge-text">MX</text>
      <text x="82" y="44" class="label">MediaMTX</text>
      <text x="82" y="70" class="small">RTSP server</text>
      <text x="82" y="91" class="small">localhost:8554</text>
    </g>

    <path d="M128 442 L128 490" class="thin"/>

    <g transform="translate(30 490)">
      <rect class="inner" width="196" height="126" fill="#f8fafc"/>
      <circle cx="44" cy="52" r="27" fill="#475569"/>
