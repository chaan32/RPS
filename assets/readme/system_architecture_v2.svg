    <g transform="translate(28 278)">
      <rect class="inner" width="146" height="92" fill="#f5f3ff" stroke="#ddd6fe"/>
      <circle cx="36" cy="46" r="27" fill="#7c3aed"/>
      <text x="25" y="52" class="badge-text">VI</text>
      <text x="78" y="39" class="label">Vite</text>
      <text x="78" y="64" class="small">frontend build</text>
    </g>

    <g transform="translate(28 410)">
      <rect class="inner" width="146" height="126" fill="#f8fafc"/>
      <circle cx="36" cy="44" r="27" fill="#334155"/>
      <text x="23" y="50" class="badge-text">UI</text>
      <text x="78" y="37" class="label">Admin</text>
      <text x="78" y="62" class="small">workers</text>
      <text x="78" y="84" class="small">snapshots</text>
      <text x="78" y="106" class="small">reports</text>
    </g>
  </g>

  <path d="M328 573 C350 573 360 573 386 573" class="arrow"/>
  <text x="324" y="548" class="tiny">video frames</text>

  <path d="M642 573 C668 508 671 368 700 314" class="arrow"/>
  <text x="633" y="492" class="tiny">RTSP input</text>

  <path d="M1154 782 C1185 736 1194 610 1212 598" class="arrow"/>
  <text x="1130" y="676" class="tiny">risk event</text>

  <path d="M1468 330 C1492 330 1505 330 1526 330" class="arrow"/>
  <text x="1459" y="302" class="tiny">API</text>

  <path d="M1468 598 C1492 588 1505 548 1526 528" class="arrow"/>
  <text x="1452" y="577" class="tiny">report</text>

  <g transform="translate(80 1000)">
    <rect width="1640" height="70" rx="24" fill="#e2e8f0"/>
    <text x="34" y="42" class="chip-text">Data Contract</text>
    <text x="204" y="42" class="small">RTSP frames</text>
    <path d="M308 37 L380 37" class="dash" marker-end="url(#arrow)"/>
    <text x="402" y="42" class="small">YOLO detections</text>
    <path d="M536 37 L608 37" class="dash" marker-end="url(#arrow)"/>
    <text x="630" y="42" class="small">BEV coordinates</text>
    <path d="M778 37 L850 37" class="dash" marker-end="url(#arrow)"/>
    <text x="872" y="42" class="small">Fusion risk score</text>
    <path d="M1024 37 L1096 37" class="dash" marker-end="url(#arrow)"/>
    <text x="1118" y="42" class="small">DB / MQTT / Report</text>
    <path d="M1286 37 L1358 37" class="dash" marker-end="url(#arrow)"/>
    <text x="1380" y="42" class="small">React dashboard</text>
  </g>
</svg>
