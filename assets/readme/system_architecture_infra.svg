      .dash{fill:none;stroke:#222;stroke-width:2.4;stroke-dasharray:7 6;marker-end:url(#arrow)}
      .line{fill:none;stroke:#222;stroke-width:2.5;marker-end:url(#arrow)}
      .thin{fill:none;stroke:#6b7280;stroke-width:1.7}
      .port{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:12px;font-weight:800;fill:#2563eb}
      .iconText{font-family:Inter,Apple SD Gothic Neo,Pretendard,Arial,sans-serif;font-size:15px;font-weight:900;fill:#fff}
