      .subtitle { font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", Arial, sans-serif; font-size: 19px; font-weight: 500; fill: #475569; }
      .layer-title { font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #0F172A; }
      .layer-desc { font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #64748B; }
      .component { font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", Arial, sans-serif; font-size: 19px; font-weight: 800; fill: #111827; }
      .component-sub { font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #64748B; }
