      .badge-text { font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", Arial, sans-serif; font-size: 13px; font-weight: 800; fill: #FFFFFF; }
      .arrow-label { font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", Arial, sans-serif; font-size: 13px; font-weight: 800; fill: #475569; }
