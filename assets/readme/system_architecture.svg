  <text x="72" y="118" class="subtitle">Unity 시뮬레이션 영상 입력부터 실시간 위험 판단, 로그 저장, 비동기 리포트, React 대시보드까지 연결한 E2E 구조</text>

  <!-- Layer containers -->
  <g filter="url(#shadow)">
    <rect x="58" y="172" width="260" height="650" rx="24" fill="#FFFFFF" stroke="#D7DEE8" stroke-width="2"/>
    <rect x="348" y="172" width="260" height="650" rx="24" fill="#FFFFFF" stroke="#D7DEE8" stroke-width="2"/>
    <rect x="638" y="172" width="360" height="650" rx="24" fill="#FFFFFF" stroke="#D7DEE8" stroke-width="2"/>
    <rect x="1028" y="172" width="260" height="650" rx="24" fill="#FFFFFF" stroke="#D7DEE8" stroke-width="2"/>
