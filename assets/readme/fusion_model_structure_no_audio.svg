<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-label="Pairwise Interaction Fusion Model structure without dynamic audio">
  <defs>
    <style>
      .bg { fill: #fbfaea; }
      .outer { fill: #ffffff; stroke: #f2bf00; stroke-width: 4; }
      .title { fill: #050505; }
      .title-text { fill: #ffd400; font: 42px Arial, sans-serif; letter-spacing: 0; }
      .band-pink { fill: #f8e9f4; }
      .band-gray { fill: #d9d9d9; }
      .band-blue { fill: #c4d0ff; }
      .band-green { fill: #e4f8a9; }
      .side-gray { fill: #d9d9d9; }
      .side-blue { fill: #bac8ff; }
      .side-green { fill: #daf59a; }
      .card { fill: #ffffff; stroke: none; }
      .small-card { fill: #ffffff; stroke: #dddddd; stroke-width: 1.5; }
      .text-xl { fill: #111111; font: 36px Arial, sans-serif; }
      .text-lg { fill: #111111; font: 30px Arial, sans-serif; }
      .text-md { fill: #111111; font: 24px Arial, sans-serif; }
      .text-sm { fill: #333333; font: 19px Arial, sans-serif; }
      .text-xs { fill: #444444; font: 16px Arial, sans-serif; }
      .muted { fill: #666666; font: 18px Arial, sans-serif; }
      .bold { font-weight: 700; }
      .dash { stroke: #666666; stroke-width: 2; stroke-dasharray: 8 10; }
      .arrow { stroke: #222222; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .thin-arrow { stroke: #333333; stroke-width: 2.5; fill: none; marker-end: url(#arrow-small); }
      .safe { fill: #ffffff; stroke: #12984d; stroke-width: 3; }
      .warning { fill: #ffffff; stroke: #f59e0b; stroke-width: 3; }
      .danger { fill: #ffffff; stroke: #dc2626; stroke-width: 3; }
      .badge { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .mono { font: 18px Menlo, Consolas, monospace; fill: #111111; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222222"/>
    </marker>
    <marker id="arrow-small" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1200"/>
  <rect class="outer" x="54" y="70" width="1492" height="1090" rx="46"/>

  <rect class="title" x="80" y="56" width="1040" height="78" rx="34"/>
  <text class="title-text" x="174" y="107">PAIRWISE INTERACTION FUSION MODEL 구조</text>

  <rect class="band-pink" x="240" y="156" width="1300" height="68" rx="34"/>
  <text class="text-xl bold" x="615" y="201">Multi-View Spatial-Temporal Risk Fusion</text>
  <rect class="badge" x="1190" y="169" width="292" height="42" rx="20"/>
  <text class="text-sm bold" x="1214" y="197">Dynamic audio disabled</text>

  <rect class="side-gray" x="88" y="240" width="110" height="350" rx="54"/>
  <text class="text-lg bold" x="128" y="360">입력</text>
  <text class="text-md bold" x="123" y="400">최대</text>
  <text class="text-md bold" x="123" y="438">7개</text>

  <rect class="band-gray" x="236" y="240" width="1308" height="350" rx="32"/>

  <rect class="card" x="282" y="270" width="390" height="290" rx="34"/>
  <text class="text-lg bold" x="377" y="320">CAM 1 RTSP</text>
  <text class="muted" x="383" y="354">worker side view</text>
  <line class="dash" x1="304" y1="380" x2="650" y2="380"/>
  <text class="text-md" x="332" y="428">YOLO-Pose worker</text>
  <text class="text-sm" x="332" y="462">bbox / keypoint → foot point</text>
  <text class="text-md" x="332" y="505">Custom YOLO forklift</text>
  <text class="text-sm" x="332" y="538">bbox → reference point</text>

  <rect class="card" x="720" y="270" width="390" height="290" rx="34"/>
  <text class="text-lg bold" x="815" y="320">CAM 2 RTSP</text>
  <text class="muted" x="813" y="354">forklift side view</text>
  <line class="dash" x1="742" y1="380" x2="1088" y2="380"/>
  <text class="text-md" x="770" y="428">YOLO-Pose worker</text>
  <text class="text-sm" x="770" y="462">bbox / keypoint → foot point</text>
  <text class="text-md" x="770" y="505">Custom YOLO forklift</text>
  <text class="text-sm" x="770" y="538">bbox → reference point</text>

  <rect class="card" x="1158" y="270" width="340" height="290" rx="34"/>
  <text class="text-lg bold" x="1205" y="318">Calibration &amp; BEV</text>
  <text class="muted" x="1220" y="354">ArUco Homography</text>
  <line class="dash" x1="1180" y1="380" x2="1476" y2="380"/>
  <text class="text-md" x="1202" y="427">pixel → world x,y</text>
  <text class="text-sm" x="1202" y="462">cam1/cam2 shared plane</text>
  <text class="text-md" x="1202" y="505">DropZone world point</text>
  <text class="text-sm" x="1202" y="538">fixed or detected object center</text>

  <path class="arrow" d="M 890 612 L 890 650"/>

  <rect class="side-blue" x="88" y="636" width="110" height="354" rx="54"/>
  <text class="text-lg bold" x="126" y="760">모델</text>
  <text class="text-md bold" x="123" y="800">계산</text>

  <rect class="band-blue" x="236" y="636" width="1308" height="354" rx="32"/>

  <rect class="small-card" x="280" y="664" width="280" height="292" rx="34"/>
  <text class="text-md bold" x="318" y="716">Graph Input Builder</text>
  <text class="mono" x="318" y="760">nodes: (B,3,T,8)</text>
  <text class="mono" x="318" y="792">adj:   (B,T,3,3)</text>
  <text class="mono" x="318" y="824">scene: (B,T,6)</text>
  <text class="text-xs" x="318" y="868">node = x,y,vx,vy,type,size</text>
  <text class="text-xs" x="318" y="894">scene includes fixed audio slot</text>

  <path class="thin-arrow" d="M 570 812 L 630 812"/>

  <rect class="small-card" x="650" y="664" width="250" height="292" rx="34"/>
  <text class="text-md bold" x="698" y="734">Shared GCN</text>
  <text class="text-lg bold" x="710" y="778">2-layer</text>
  <text class="mono" x="696" y="827">8 → 24 → 24</text>
  <text class="text-sm" x="696" y="874">spatial interaction</text>
  <text class="text-xs" x="696" y="902">GraphConv(A+I normalized)</text>

  <path class="thin-arrow" d="M 910 812 L 970 812"/>

  <rect class="small-card" x="990" y="664" width="250" height="292" rx="34"/>
  <text class="text-md bold" x="1030" y="734">Temporal Encoder</text>
  <text class="text-lg bold" x="1062" y="778">GRU</text>
  <text class="mono" x="1034" y="827">Conv1d + BN</text>
  <text class="mono" x="1034" y="859">GRU(24)</text>
  <text class="text-sm" x="1034" y="902">node history embedding</text>

  <path class="thin-arrow" d="M 1250 812 L 1305 812"/>

  <rect class="small-card" x="1320" y="664" width="188" height="132" rx="24"/>
  <text class="text-sm bold" x="1352" y="710">Forklift branch</text>
  <text class="text-xs" x="1344" y="742">worker + forklift</text>
  <text class="text-xs" x="1344" y="768">scene[0,2,4,5]</text>

  <rect class="small-card" x="1320" y="824" width="188" height="132" rx="24"/>
  <text class="text-sm bold" x="1352" y="870">DropZone branch</text>
  <text class="text-xs" x="1344" y="902">worker + dropzone</text>
  <text class="text-xs" x="1344" y="928">scene[0,1,3]</text>

  <path class="arrow" d="M 890 1000 L 890 1026"/>

  <rect class="side-green" x="88" y="1004" width="110" height="126" rx="54"/>
  <text class="text-md bold" x="121" y="1076">결과</text>

  <rect class="band-green" x="236" y="990" width="1308" height="150" rx="30"/>
  <text class="text-md bold" x="316" y="1028">Output risk matrix: (B, N_workers, K=2)</text>
  <text class="text-sm" x="316" y="1060">K[0] worker vs forklift, K[1] worker vs dropzone.</text>
  <text class="text-sm" x="316" y="1088">Runtime adds FH point + TTC early warning.</text>

  <rect class="safe" x="842" y="1080" width="190" height="42" rx="20"/>
  <text class="text-sm bold" x="884" y="1108">SAFE &lt; 0.4</text>
  <rect class="warning" x="1048" y="1080" width="226" height="42" rx="20"/>
  <text class="text-sm bold" x="1078" y="1108">0.4 ≤ WARNING &lt; 0.8</text>
  <rect class="danger" x="1290" y="1080" width="190" height="42" rx="20"/>
  <text class="text-sm bold" x="1325" y="1108">DANGER ≥ 0.8</text>
</svg>
