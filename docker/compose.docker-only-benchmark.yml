# Docker-only benchmark stack.
#
# This compose file intentionally does not publish service ports to the host.
# All benchmark traffic stays on the Docker network:
#   rtsp_publisher -> mediamtx_bench -> realtime_benchmark -> backend_bench
#                                                backend_bench -> postgres/mosquitto

services:
  postgres_bench:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-haechan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haechan8864}
      POSTGRES_DB: ${POSTGRES_DB:-pobiga_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haechan}"]
      interval: 5s
      timeout: 3s
      retries: 20

  mosquitto_bench:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  mediamtx_bench:
    image: bluenviron/mediamtx:latest
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  backend_bench:
    image: ai_project-backend:docker-only-benchmark
    build:
      context: ..
      dockerfile: Dockerfile.backend
    depends_on:
      postgres_bench:
        condition: service_healthy
      mosquitto_bench:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-haechan}:${POSTGRES_PASSWORD:-haechan8864}@postgres_bench:5432/${POSTGRES_DB:-pobiga_db}
      MQTT_BROKER: mosquitto_bench
      SERVER_PORT: 1122
      DISABLE_FUSION_SUBPROCESS: "1"
      SERVER_METRICS_PATH: ${DOCKER_SERVER_METRICS_PATH:-metrics/docker_only_server_requests.jsonl}
      CAMERA_RTSP_URL_1: rtsp://mediamtx_bench:8554/cam1
      CAMERA_RTSP_URL_2: rtsp://mediamtx_bench:8554/cam2
      OLLAMA_HOST: ${DOCKER_OLLAMA_HOST:-http://host.docker.internal:11434}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-qwen3:8b}
      LLM_BACKEND: ${LLM_BACKEND:-local}
      USB_STORE_PATH: /usb-not-mounted
      LOCAL_SNAPSHOT_PATH: /app/snapshots
      QT_QPA_PLATFORM: offscreen
    volumes:
      - ../snapshots:/app/snapshots
      - ../calibration:/app/calibration
      - ../metrics:/app/metrics
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1122/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  rtsp_publisher:
    image: ai_project-backend:docker-only-benchmark
    build:
      context: ..
      dockerfile: Dockerfile.backend
    depends_on:
      - mediamtx_bench
    command:
      - python
      - input/media/tools/stream_collision_scenario_rtsp.py
      - --scenario
      - scenario_01_center_crossing
      - --rtsp-base
      - rtsp://mediamtx_bench:8554
      - --duration
      - ${RTSP_PUBLISH_DURATION:-180}
    volumes:
      - ../simulation:/app/simulation:ro
    profiles: ["run"]

  realtime_benchmark:
    image: ai_project-backend:docker-only-benchmark
    build:
      context: ..
      dockerfile: Dockerfile.backend
    depends_on:
      backend_bench:
        condition: service_healthy
      mediamtx_bench:
        condition: service_started
    environment:
      HEADLESS: "1"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-haechan}:${POSTGRES_PASSWORD:-haechan8864}@postgres_bench:5432/${POSTGRES_DB:-pobiga_db}
      MQTT_BROKER: mosquitto_bench
      CAMERA_RTSP_URL_1: rtsp://mediamtx_bench:8554/cam1
      CAMERA_RTSP_URL_2: rtsp://mediamtx_bench:8554/cam2
      FUSION_SERVER_URL: http://backend_bench:1122
      BEST_MODEL_PATH: model/yolo/best_forklift_box_colab.pt
      LOCAL_SNAPSHOT_PATH: /app/snapshots
      USB_STORE_PATH: /usb-not-mounted
      QT_QPA_PLATFORM: offscreen
    command:
      - python
      - -m
      - model.fusion.runtime.realtime_camera
      - --no-audio
      - --no-prompt
      - --duration
      - "60"
      - --run-label
      - ${DOCKER_RUN_LABEL:-docker_only_s01}
      - --metrics-path
      - ${DOCKER_METRICS_PATH:-metrics/docker_only_s01.jsonl}
    volumes:
      - ../snapshots:/app/snapshots
      - ../calibration:/app/calibration
      - ../metrics:/app/metrics
    profiles: ["run"]
