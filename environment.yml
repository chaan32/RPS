name: venv
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - nodejs=22
  - pip
  - pip:
    
    - fastapi==0.111.0 # server
    - uvicorn==0.30.1 # web-serber ASGI
    - sqlalchemy==2.0.30 # ORM
    - asyncpg==0.29.0 # DB driver postgralSQL
    - greenlet==3.0.3 # SQLAlchemy async 
    - python-dotenv==1.0.1 # project Config
    - aiomqtt==2.3.0 # mqtt
    - google-generativeai==0.8.3 # Gemini LLM API
    - httpx==0.28.1 # Ollama local LLM 호출
    - pydantic==2.7.4 # data validation
    - eval_type_backport==0.2.0 # `date | None` 등 PEP 604 타입 평가 백포트
    - numpy>=1.24.0 # 배열 연산, 이미지 처리
    - opencv-python==4.10.0.84 # camera, image processing
    - loguru==0.7.3 # logging
    - torch>=2.0.0 # ultralytics 의존성 (PyTorch)
    - torchvision>=0.15.0 # ultralytics 의존성
    - ultralytics ==8.4.38 # 욜로
    - lap>=0.5.12 # YOLO tracker (linear assignment)
    - tensorflow>=2.12.0 # YAMNet 모델 로드 및 학습
    - tensorflow-hub>=0.13.0 # YAMNet 다운로드
    - soundfile>=0.12.0 # WAV 파일 읽기/쓰기
    - librosa>=0.10.0 # 오디오 전처리 (리샘플링)
    - sounddevice>=0.4.6 # 실시간 마이크 입력
    - scikit-learn>=1.3.0 # train/test 분할, 평가 리포트
    - scipy>=1.11.0 # WAV 파일 저장 (녹음)
    - pydub>=0.25.1 # mp3 → wav 오디오 변환
    - matplotlib>=3.7.0 # 학습 결과 시각화
    - jupyter>=1.0.0 # Jupyter Notebook
    - ipykernel>=6.25.0 # 가상환경 커널 등록