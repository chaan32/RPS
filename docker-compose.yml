# 산업 안전 모니터링 시스템 — 멀티 컨테이너 구성.
#
# 실행:        docker compose up -d
# 종료:        docker compose down
# 로그:        docker compose logs -f backend
# 재빌드:      docker compose build backend
#
# 외부 의존성:
#   - 카메라 RTSP : .env 의 CAMERA_RTSP_URL_1/2 (host network 사용)
#   - ESP32       : 같은 LAN 에서 backend WebSocket /ws/audio 로 접속
#   - Ollama      : 호스트 또는 다른 머신 (LOCAL_LLM_BACKEND=local 시)
#   - USB         : volumes 매핑

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-haechan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haechan8864}
      POSTGRES_DB: ${POSTGRES_DB:-pobiga_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haechan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MQTT 브로커 (Mosquitto) ────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # ── Redis — 짧은 background job queue / job status 저장소 ───────────
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6380:6379"

  # ── Elasticsearch — 대량 로그 검색용 read model ────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  # ── FastAPI 백엔드 + Fusion subprocess ─────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    # bridge 네트워크 (frontend → backend 서비스 이름 해석 가능).
    # 외부 RTSP 카메라는 NAT 로 정상 접근. Linux + GPU 환경에서 host 네트워크가
    # 필요하면 `network_mode: host` 로 바꾸고, 그 경우 frontend nginx 의
    # proxy_pass 를 http://host.docker.internal:1122 로 변경 필요.
    ports:
      - "1122:1122"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    environment:
      # DB / MQTT 는 compose 내부 service name 으로 해석
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-haechan}:${POSTGRES_PASSWORD:-haechan8864}@postgres:5432/${POSTGRES_DB:-pobiga_db}
      MQTT_BROKER: mosquitto
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INCIDENT_INDEX: incident_logs_v1
      SERVER_PORT: 1122
      # 카메라 / LLM / 모델 경로 — .env 에서 그대로 주입
      CAMERA_RTSP_URL_1: ${CAMERA_RTSP_URL_1}
      CAMERA_RTSP_URL_2: ${CAMERA_RTSP_URL_2}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://127.0.0.1:11434}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-qwen3:8b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_BACKEND: ${LLM_BACKEND:-local}
      BEST_MODEL_PATH: model/yolo/best_final.pt
      # USB 컨테이너에선 못 꽂으므로 일부러 invalid 경로 → 코드가 LOCAL_SNAPSHOT_PATH 로 폴백.
      USB_STORE_PATH: /usb-not-mounted
      LOCAL_SNAPSHOT_PATH: /app/snapshots
    volumes:
      # 사고 스냅샷 — 호스트의 ./snapshots 를 컨테이너의 /app/snapshots 로 매핑
      - ./snapshots:/app/snapshots
      # 캘리브레이션 — 호스트와 공유 (재학습 / verify_homography 결과 공유용)
      - ./calibration:/app/calibration
      # 성능 측정용
      - ./metrics:/app/metrics 

  # ── React 프론트엔드 (Nginx 정적 서빙 + /api 프록시) ────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ── RTSP bridge — Unity/Mock 영상을 MediaMTX 로 중계 ───────────────
  # Unity collision scenario 검증:
  #   docker compose --profile mock up -d mediamtx
  #   python input/media/tools/stream_collision_scenario_rtsp.py
  #
  # 오래된 파일 기반 fake publisher 까지 같이 띄우려면 별도 profile 사용:
  #   docker compose --profile mock-file up -d
  #
  # 띄운 뒤 .env 의 CAMERA_RTSP_URL_1/2 를 다음으로 설정:
  #   CAMERA_RTSP_URL_1=rtsp://mediamtx:8554/cam1
  #   CAMERA_RTSP_URL_2=rtsp://mediamtx:8554/cam2
  mediamtx:
    image: bluenviron/mediamtx:latest
    profiles: ["mock", "mock-file"]
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS  (브라우저: http://localhost:8888/cam1)
      - "8889:8889"   # WebRTC
    volumes:
      - ./docker/mediamtx.yml:/mediamtx.yml:ro

  ffmpeg-cam1:
    image: linuxserver/ffmpeg:latest
    profiles: ["mock-file"]
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./input/media/test/mock_rtsp:/videos:ro
    entrypoint:
      - ffmpeg
      - -re
      - -stream_loop
      - "-1"
      - -i
      - /videos/fake_cam1.mp4
      - -an
      - -c:v
      - libx264
      - -preset
      - ultrafast
      - -tune
      - zerolatency
      - -pix_fmt
      - yuv420p
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx:8554/cam1

  ffmpeg-cam2:
    image: linuxserver/ffmpeg:latest
    profiles: ["mock-file"]
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./input/media/test/mock_rtsp:/videos:ro
    entrypoint:
      - ffmpeg
      - -re
      - -stream_loop
      - "-1"
      - -i
      - /videos/fake_cam2.mp4
      - -an
      - -c:v
      - libx264
      - -preset
      - ultrafast
      - -tune
      - zerolatency
      - -pix_fmt
      - yuv420p
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx:8554/cam2

# ── 영속 볼륨 ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  elasticsearch_data:
