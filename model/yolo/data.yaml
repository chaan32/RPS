# YOLO 커스텀 모델 학습 데이터셋 정의
#
# ⚠️ 학습 환경마다 path 를 본인 데이터셋 위치로 수정해서 사용하세요.
#    옛 학습 환경(2026-04, Windows):
#       C:/Users/niced/Downloads/yolo_image_forklift_hoist/dataset/forklift_night_4.16
#
# 권장: 상대경로 또는 환경변수 (예: ${oc.env:YOLO_DATASET_PATH})

path: ../../dataset/forklift_night_4.16   # 본인 환경에 맞게 수정
train: images/train
val: images/val
test: images/test

# ⚠️ 운영 모델(YOLO/best_final.pt)의 실제 클래스는 다음과 같습니다:
#       {0: forklift, 1: box_1, 2: box_2}
# 이 data.yaml 은 옛 hoist 통합 라벨 학습본입니다.
# 새 데이터로 학습 시 클래스 일관성 확인 필요.
names:
  0: forklift
  1: hoist
