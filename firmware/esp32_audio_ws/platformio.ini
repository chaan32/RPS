; ESP32-S3-WROOM-1 → 맥북 FastAPI WebSocket 오디오 스트리머
;
; 빌드:  pio run
; 업로드: pio run -t upload
; 시리얼: pio device monitor
;
; Arduino core 2.0.x 계열 (legacy driver/i2s.h 사용)에 맞춰 platform 버전을 고정해 둔다.
; core 3.x(i2s_std.h 기반)로 올리려면 src/main.cpp 의 I2S 초기화 코드를 바꿔야 한다.

[env:esp32-s3-devkitc-1]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
; upload_port / monitor_port 는 비워두면 PlatformIO 가 자동 감지한다.
; 자동 감지가 잘못 잡히면 아래에 명시적으로 지정:
;   macOS  예: /dev/cu.usbserial-2120
;   Windows 예: COM5

build_flags =
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    gilmaimon/ArduinoWebsockets@^0.5.4
